version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: text2sql_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: text2sql
    ports:
      - "5432:5432"
    volumes:
      - text2sql-data:/var/lib/postgresql/data

volumes:
  text2sql-data:
